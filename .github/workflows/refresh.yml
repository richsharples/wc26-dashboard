name: Refresh WC26 Dashboard

on:
  schedule:
    # Hourly, on the hour (UTC). Keeps results/bracket near-current during play.
    - cron: "0 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    # Rebuild immediately when the favourites config changes. The auto-commit
    # below only touches index.html, so it won't retrigger this workflow.
    paths:
      - favorites.md

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic refresh script
        run: python3 refresh.py

      - name: Commit and push if changed
        run: |
          git config user.name "wc26-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh dashboard ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
